name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip AkashVPN.zip
      - name: Make gradlew executable
        run: chmod +x AkashVPN/gradlew
      - name: Build APK
        run: |
          cd AkashVPN
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v3
        with:
          name: AkashVPN-debug
          path: AkashVPN/app/build/outputs/apk/debug/app-debug.apk
