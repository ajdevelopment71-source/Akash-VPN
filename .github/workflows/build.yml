name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জিপ ফাইল আনজিপ করা
    - name: Unzip AkashVPN Source Code
      run: |
        if [ -f "AkashVPN.zip" ]; then
          unzip -o AkashVPN.zip
        else
          echo "AkashVPN.zip file not found!"
        fi

    # ২. JDK 17 সেটআপ
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. gradlew ফাইলের ফরম্যাট ঠিক করা এবং পারমিশন দেওয়া (💡 এটাই মেইন ফিক্স)
    - name: Fix Gradlew File Format and Permissions
      run: |
        if [ -d "AkashVPN" ]; then
          cd AkashVPN
        fi
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    # ৪. অ্যান্ড্রয়েড প্রজেক্টের APK বিল্ড করা
    - name: Build Debug APK
      run: |
        if [ -d "AkashVPN" ]; then
          cd AkashVPN
        fi
        ./gradlew assembleDebug --stacktrace

    # ৫. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
