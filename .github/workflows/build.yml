name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip
        run: unzip AkashVPN.zip

      - name: Clone ics-openvpn
        run: |
          git clone --depth 1 --branch v0.7.47 https://github.com/schwabe/ics-openvpn.git AkashVPN2/ics-openvpn

      - name: Patch ics-openvpn build file
        run: |
          # Root build.gradle.kts এর repository block সরিয়ে দাও
          sed -i '/allprojects/,/^}/d' AkashVPN2/ics-openvpn/build.gradle.kts || true
          # main/build.gradle.kts এর repository block সরিয়ে দাও
          sed -i '/^repositories/,/^}/d' AkashVPN2/ics-openvpn/main/build.gradle.kts || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build
        run: |
          cd AkashVPN2
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - uses: actions/upload-artifact@v4
        with:
          name: AkashVPN
          path: AkashVPN2/app/build/outputs/apk/debug/app-debug.apk
