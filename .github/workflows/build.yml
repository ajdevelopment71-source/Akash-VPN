name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জিপ ফাইল আনজিপ করা
    - name: Unzip Source Code
      run: |
        unzip -o AkashVPN.zip -d my_app

    # ২. Gradle 8.0 এর জন্য বাধ্যতামূলক JDK 17 সেটআপ করা
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. প্রজেক্টের চাহিদা অনুযায়ী ঠিক Gradle 8.0 নির্দিষ্ট করে দেওয়া
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0' 

    # ৪. মেইন ফোল্ডার খুঁজে সরাসরি বিল্ড করা
    - name: Build APK Direct
      run: |
        ROOT_DIR=$(find my_app -name "settings.gradle" -exec dirname {} \;)
        cd "$ROOT_DIR"
        gradle assembleDebug --stacktrace

    # ৫. তৈরি হওয়া APK ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
