name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip
        run: unzip AkashVPN.zip -d project

      - name: Fix gradle.properties
        run: |
          cd project/AkashVPN
          echo "org.gradle.jvmargs=-Xmx1536m" > gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties

      - name: Build
        run: |
          cd project/AkashVPN
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v3
        with:
          name: AkashVPN
          path: project/AkashVPN/app/build/outputs/apk/debug/app-debug.apk
