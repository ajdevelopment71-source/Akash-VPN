name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. আপনার জিপ ফাইলের ফোল্ডার স্ট্রাকচার অনুযায়ী সঠিক ডিরেক্টরিতে যাওয়া ও পারমিশন দেওয়া
    - name: Grant Execute Permission for Gradlew
      run: |
        if [ -d "AkashVPN" ]; then
          cd AkashVPN
        fi
        chmod +x gradlew

    # ২. অ্যান্ড্রয়েড প্রজেক্ট সফলভাবে বিল্ড করা
    - name: Build Debug APK
      run: |
        if [ -d "AkashVPN" ]; then
          cd AkashVPN
        fi
        ./gradlew assembleDebug --stacktrace

    # ৩. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য রেডি করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
