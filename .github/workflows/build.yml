name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জিপ ফাইল আনজিপ করা
    - name: Unzip Source Code
      run: |
        unzip -o AkashVPN.zip -d my_app

    # ২. JDK 11 সেটআপ করা (যা Gradle 7-এর জন্য একদম পারফেক্ট)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # ৩. আপনার প্রজেক্ট অনুযায়ী Gradle 7.5 সংস্করণ নির্দিষ্ট করে দেওয়া
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5' 

    # ৪. মেইন ডিরেক্টরি খুঁজে সরাসরি বিল্ড করা
    - name: Build APK Direct
      run: |
        ROOT_DIR=$(find my_app -name "settings.gradle" -exec dirname {} \;)
        cd "$ROOT_DIR"
        gradle assembleDebug --stacktrace

    # ৫. তৈরি হওয়া APK ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
