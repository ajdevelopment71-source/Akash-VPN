name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জিপ ফাইল আনজিপ করা
    - name: Unzip AkashVPN Source Code
      run: |
        if [ -f "AkashVPN.zip" ]; then
          unzip -o AkashVPN.zip
        fi

    # ২. JDK 17 সেটআপ
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. ভাঙা gradlew ফাইল স্কিপ করে সরাসরি জার (JAR) ফাইল দিয়ে বিল্ড করা
    - name: Build APK Direct via Gradle Wrapper Jar
      run: |
        # প্রজেক্টের মেইন ডিরেক্টরি খুঁজে বের করা
        PROJECT_DIR=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
        cd "$PROJECT_DIR"
        
        # gradlew ফাইল ব্যবহার না করে সরাসরি ভেতরের wrapper jar রান করা হলো
        java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain assembleDebug --stacktrace

    # ৪. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
