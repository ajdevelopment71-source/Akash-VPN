name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. আপনার আপলোড করা জিপ ফাইলটি আনজিপ করা
    - name: Unzip AkashVPN Source Code
      run: |
        if [ -f "AkashVPN.zip" ]; then
          unzip -o AkashVPN.zip
        else
          echo "AkashVPN.zip file not found!"
        fi

    # ২. JDK 17 সেটআপ করা
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. gradlew ফাইলটি ঠিক কোথায় আছে তা স্বয়ংক্রিয়ভাবে খুঁজে বের করা এবং রান করা
    - name: Auto Find Gradlew and Build APK
      run: |
        # পুরো রিপোজিটরির ভেতর gradlew ফাইলটি কোথায় আছে তা খোঁজা হচ্ছে
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file could not be found anywhere after unzip!"
          exit 1
        fi
        
        # সেই ফোল্ডারের ডিরেক্টরিতে যাওয়া
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLEW_DIR"
        
        # ফাইলের উইন্ডোজ ফরম্যাট ঠিক করা এবং পারমিশন দেওয়া
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        
        # সরাসরি নিখুঁতভাবে বিল্ড রান করা
        ./gradlew assembleDebug --stacktrace

    # ৪. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
