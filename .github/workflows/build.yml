name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. আপনার আপলোড করা জিপ ফাইলটি আনজিপ করার কমান্ড
    - name: Unzip AkashVPN Source Code
      run: |
        if [ -f "AkashVPN.zip" ]; then
          unzip -o AkashVPN.zip
        else
          echo "AkashVPN.zip file not found in root directory!"
        fi

    # ২. JDK 17 সেটআপ করা
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. আনজিপ হওয়া ফোল্ডারে ঢুকে gradlew ফাইলটিকে রান করার পারমিশন দেওয়া
    - name: Grant Execute Permission for Gradlew
      run: |
        if [ -d "AkashVPN" ]; then
          cd AkashVPN
        fi
        chmod +x gradlew

    # ৪. অ্যান্ড্রয়েড প্রজেক্টের APK বিল্ড করা
    - name: Build Debug APK
      run: |
        if [ -d "AkashVPN" ]; then
          cd AkashVPN
        fi
        ./gradlew assembleDebug --stacktrace

    # ৫. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য রেডি করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
