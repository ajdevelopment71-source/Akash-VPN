name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. আপনার আপলোড করা জিপ ফাইলটি আনজিপ করা
    - name: Unzip AkashVPN Source Code
      run: |
        if [ -f "AkashVPN.zip" ]; then
          unzip -o AkashVPN.zip
        else
          echo "AkashVPN.zip file not found!"
        fi

    # ২. JDK 17 সেটআপ করা
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. গ্র্যাডল রান করা (💡 ফরম্যাটের ঝামেলা এড়াতে সরাসরি bash দিয়ে রান)
    - name: Build Debug APK
      run: |
        if [ -d "AkashVPN" ]; then
          cd AkashVPN
        fi
        chmod +x gradlew
        bash gradlew assembleDebug --stacktrace

    # ৪. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
