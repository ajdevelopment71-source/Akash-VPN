name: Android APK Build from Zip

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জিপ ফাইল আনজিপ করে my_app নামের ফোল্ডারে রাখা হচ্ছে
    - name: Unzip Source Code
      run: |
        unzip -o AkashVPN.zip -d my_app

    # ২. JDK 17 সেটআপ
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ৩. গিটহাবের নিজস্ব অরিজিনাল গ্র্যাডল সেটআপ করা (gradlew বাদ)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # ৪. মেইন ডিরেক্টরি খুঁজে গিটহাবের নিজস্ব গ্র্যাডল দিয়ে সরাসরি বিল্ড করা
    - name: Build APK Direct
      run: |
        # যেখানে settings.gradle আছে সেটাই মেইন প্রজেক্ট
        ROOT_DIR=$(find my_app -name "settings.gradle" -exec dirname {} \;)
        cd "$ROOT_DIR"
        
        # এখানে gradlew এর বদলে সরাসরি সার্ভারের gradle কমান্ড ব্যবহার করা হলো
        gradle assembleDebug --stacktrace

    # ৫. তৈরি হওয়া APK আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AkashVPN-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
